spring.application.name=ai-ocr-app
server.port=8081

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# AI Orchestration
# Available Providers: poe, ollama
ai.provider=poe

# Poe AI Configuration (OpenAI Compatible)
# Get your API key at: https://poe.com/api/keys
poe.api.key=9CSdvgswMVtLheAWsuMowshFrrLIW2TSRS0luzs41jw
poe.model.id=GPT-4o

# Ollama Local Configuration
ollama.api.url=http://localhost:11434/api/chat
ollama.model.id=mistral
