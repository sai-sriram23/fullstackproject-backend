spring.application.name=cseghrender
server.port=${PORT:8085}

# Database Configuration
# Fallback to H2 locally, use environment variables for Render/Postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/aiocrdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
