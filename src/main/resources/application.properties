spring.application.name=cseghrender
server.port=${PORT:8085}

# Database Configuration
# Fallback to local H2 file if PostgreSQL environment variables are not provided
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/aiocrdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
